services:
  mongo:
    image: mongo:7
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - caesar_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  caesar:
    build: .
    ports:
      - "127.0.0.1:9876:9876"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://mongo:27017/caesar
    volumes:
      - ~/.caesar:/home/node/.caesar
    restart: unless-stopped

volumes:
  caesar_data:
