<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ═══════════════════ UNLOCK VIEW ═══════════════════ -->
  <div id="unlock-view" class="view">
    <div class="unlock-container">
      <!-- Subtle dot-grid background texture (Passflow-inspired) -->
      <div class="bg-dots" aria-hidden="true"></div>

      <div class="brand">
        <div class="brand-icon">
          <img src="../icons/logo.png" alt="VaultChain" width="72" height="72" />
        </div>
        <h1 class="brand-title">VaultChain</h1>
        <p class="brand-subtitle">Unlock your vault to continue</p>
      </div>

      <form id="unlock-form" autocomplete="off">
        <div class="input-group">
          <div class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <input
            type="password"
            id="password-input"
            placeholder="Master Password"
            autocomplete="off"
            spellcheck="false"
            required
          />
          <button type="button" id="toggle-password" class="input-action" title="Show password">
            <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>

        <div id="unlock-error" class="error-msg" aria-live="polite"></div>

        <button type="submit" id="unlock-btn" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
          </svg>
          <span>Unlock Vault</span>
        </button>
      </form>

      <div class="unlock-footer">
        <div class="security-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>AES-256-GCM · Argon2id · On-Chain Verified</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ ENTRIES VIEW ═══════════════════ -->
  <div id="entries-view" class="view" style="display: none;">
    <header class="entries-header">
      <div class="header-top">
        <div class="header-brand">
          <img src="../icons/logo.png" alt="VaultChain" class="header-logo" width="30" height="30" />
          <span class="header-title">VaultChain</span>
        </div>
        <button id="lock-btn" class="btn-icon" title="Lock vault">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="search-wrapper">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="search-input"
          placeholder="Search entries..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </header>

    <div class="entries-count">
      <span id="entries-count-text">0 entries</span>
    </div>

    <div id="entries-list" class="entries-list">
      <!-- Entry rows injected by JS -->
    </div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <p>No entries found</p>
    </div>
  </div>

  <!-- ═══════════════ CLIPBOARD TOAST ═══════════════ -->
  <div id="clipboard-toast" class="toast" aria-live="polite">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span>Password copied · clears in 30s</span>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
